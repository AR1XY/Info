<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR1XY info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #007bff; /* Синий */
            --btn-text: #ffffff;   /* Белый текст */
            --main-shadow: rgba(0, 123, 255, 0.4);
        }

        /* КРАСНАЯ ТЕМА */
        [data-theme="red"] {
            --main-color: #ff0000; /* Ярко-красный */
            --btn-text: #000000;   /* Черный текст */
            --main-shadow: rgba(255, 0, 0, 0.5);
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.4s ease;
        }

        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--main-color);
            transition: 0.3s;
            z-index: 1000;
            color: var(--main-color);
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 30px;
            background: rgba(20, 20, 20, 0.8);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-weight: 900;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: var(--main-color);
            text-shadow: 0 0 20px var(--main-shadow);
            transition: 0.4s;
        }

        .btn-custom {
            background: var(--main-color);
            color: var(--btn-text) !important;
            border: none;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            width: 100%;
            font-weight: 800; /* Жирный текст */
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 5px 15px var(--main-shadow);
        }

        .btn-custom:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px var(--main-shadow);
        }
    </style>
</head>
<body>

<div class="theme-switch" id="theme-btn">
    <i class="fas fa-eye"></i>
</div>

<div class="container">
    <h1>AR1XY info</h1>

    <a href="https://t.me/odwob" class="btn-custom">
        <i class="fab fa-telegram"></i> МОЙ TELEGRAM
    </a>

    <a href="https://t.me/Lqphu" class="btn-custom">
        <i class="fas fa-users"></i> МОЙ ТГК
    </a>

    <a href="https://www.tiktok.com/@ar1xy.ru?_r=1&_t=ZS-960PFfGz9JU" class="btn-custom">
        <i class="fab fa-tiktok"></i> МОЙ ТИК ТОК
    </a>

    <a href="https://link.brawlstars.com/invite/friend/en/?tag=82Y08V20Q" class="btn-custom">
        <i class="fas fa-gamepad"></i> ДРУЗЬЯ В БС
    </a>

    <a href="http://t.me/voprosy?start=mdhq02f" class="btn-custom">
        <i class="fas fa-comment-dots"></i> АНОНИМНЫЕ ВОПРОСЫ
    </a>
</div>

<script>
    const btn = document.getElementById('theme-btn');
    const body = document.body;

    if (localStorage.getItem('theme') === 'red') {
        body.setAttribute('data-theme', 'red');
    }

    btn.addEventListener('click', () => {
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'blue');
        } else {
            body.setAttribute('data-theme', 'red');
            localStorage.setItem('theme', 'red');
        }
    });
</script>

</body>
</html>
