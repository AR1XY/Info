<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #007bff;
            --vpn-color: #0049ad;
            --btn-text: #ffffff;
            --glow: rgba(0, 123, 255, 0.4);
        }

        [data-theme="red"] {
            --main-color: #ff0000;
            --vpn-color: #8a0000;
            --btn-text: #000000;
            --glow: rgba(255, 0, 0, 0.5);
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: 0.4s;
            cursor: none;
            touch-action: none;
        }

        /* Живой фон */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--main-color);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            animation: move 15s infinite alternate;
        }
        .bg-glow-2 {
            bottom: -100px;
            right: -100px;
            animation-delay: -7s;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        #custom-cursor {
            width: 20px; height: 20px; background-color: var(--main-color);
            border-radius: 6px; position: fixed; pointer-events: none;
            z-index: 9999; box-shadow: 0 0 15px var(--main-color);
            transform: translate(-50%, -50%);
        }

        #particle-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }

        .container { max-width: 400px; width: 90%; text-align: center; z-index: 5; position: relative; }

        h1 { 
            font-weight: 900; text-transform: uppercase; color: var(--main-color); 
            text-shadow: 0 0 20px var(--glow); letter-spacing: 3px; margin-bottom: 5px;
            animation: fadeInDown 0.8s ease-out;
        }

        .status-online { 
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            font-size: 0.9rem; margin-bottom: 25px; color: #777;
            animation: fadeIn 1.2s ease-out;
        }
        .dot { width: 8px; height: 8px; background-color: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .btn-custom {
            background: rgba(255, 255, 255, 0.05); /* Эффект стекла */
            background-color: var(--main-color);
            color: var(--btn-text) !important;
            border: none; border-radius: 15px; padding: 16px; margin-bottom: 15px;
            width: 100%; font-weight: 800; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; box-shadow: 0 0 15px var(--glow); 
            transition: 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease-out forwards;
        }

        .btn-vpn { background: var(--vpn-color) !important; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .btn-custom:hover { transform: scale(1.05) translateY(-2px) !important; filter: brightness(1.2); }

        .btn-custom:nth-child(3) { animation-delay: 0.2s; }
        .btn-custom:nth-child(4) { animation-delay: 0.3s; }
        .btn-custom:nth-child(5) { animation-delay: 0.4s; }
        .btn-custom:nth-child(6) { animation-delay: 0.5s; }
        .btn-custom:nth-child(7) { animation-delay: 0.6s; }
        .btn-custom:nth-child(8) { animation-delay: 0.7s; }

        .counter-text {
            margin-top: 20px; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1px; color: var(--main-color); opacity: 0;
            animation: fadeIn 1.5s ease-out 1s forwards;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 0.6; } }

        .theme-switch {
            position: fixed; top: 20px; right: 20px; cursor: pointer;
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--main-color);
            display: flex; align-items: center; justify-content: center; color: var(--main-color);
            background: rgba(255,255,255,0.1); z-index: 1000;
        }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: move-up 1s ease-out forwards; }
        @keyframes move-up { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: translateY(-60px) scale(0); opacity: 0; } }
        
        @media (max-width: 768px) { #custom-cursor { display: none; } body { cursor: auto; } }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow bg-glow-2"></div>
<div id="custom-cursor"></div>
<div id="particle-container"></div>
<div class="theme-switch" id="theme-btn"><i class="fas fa-bolt"></i></div>

<div class="container">
    <h1>AR1XY INFO</h1>
    <div class="status-online"><div class="dot"></div> Online</div>
    
    <a href="https://t.me/odwob" class="btn-custom"><i class="fab fa-telegram"></i> МОЙ TELEGRAM</a>
    <a href="https://t.me/Lqphu" class="btn-custom"><i class="fas fa-users"></i> МОЙ ТГК</a>
    <a href="https://www.tiktok.com/@ar1xy.ru?_r=1&_t=ZS-960PFfGz9JU" class="btn-custom"><i class="fab fa-tiktok"></i> МОЙ ТИК ТОК</a>
    <a href="https://link.brawlstars.com/invite/friend/en/?tag=82Y08V20Q" class="btn-custom"><i class="fas fa-gamepad"></i> ДРУЗЬЯ В БС</a>
    <a href="http://t.me/voprosy?start=mdhq02f" class="btn-custom"><i class="fas fa-comment-dots"></i> АНОНИМНЫЕ ВОПРОСЫ</a>
    <a href="https://t.me/bypassrtp" class="btn-custom btn-vpn"><i class="fas fa-shield-alt"></i> ЛУЧШИЙ ВПН</a>

    <div class="counter-text">
        Views: <span id="count">...</span>
    </div>
</div>

<script>
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    const pContainer = document.getElementById('particle-container');
    const cursor = document.getElementById('custom-cursor');

    function spawn(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 10 + 8 + 'px';
        p.style.width = size; p.style.height = size;
        const color = getComputedStyle(body).getPropertyValue('--main-color');
        p.style.background = color;
        p.style.boxShadow = `0 0 20px ${color}`;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        pContainer.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        spawn(e.clientX, e.clientY);
    });

    document.addEventListener('touchmove', (e) => {
        spawn(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: true});

    let views = localStorage.getItem('site_views') || 142;
    views++;
    localStorage.setItem('site_views', views);
    document.getElementById('count').innerText = views;

    if (localStorage.getItem('theme') === 'red') body.setAttribute('data-theme', 'red');

    btn.addEventListener('click', () => {
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'blue');
        } else {
            body.setAttribute('data-theme', 'red');
            localStorage.setItem('theme', 'red');
        }
    });
</script>
</body>
</html>
