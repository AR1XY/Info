<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #007bff;
            --dark-btn: #004494; /* Темнее для VPN */
            --btn-text: #ffffff;
            --glow: rgba(0, 123, 255, 0.6);
        }

        [data-theme="red"] {
            --main-color: #ff0000;
            --dark-btn: #660000; /* Темно-красный для VPN */
            --btn-text: #000000;
            --glow: rgba(255, 0, 0, 0.8);
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: 0.4s;
            cursor: none;
            touch-action: none;
        }

        #custom-cursor {
            width: 20px;
            height: 20px;
            background-color: var(--main-color);
            border-radius: 6px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--main-color);
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }

        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 30px;
            z-index: 1;
            position: relative;
        }

        h1 {
            font-weight: 900;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: var(--main-color);
            text-shadow: 0 0 20px var(--glow);
            letter-spacing: 3px;
        }

        .status-online {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #555;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .btn-custom {
            background: var(--main-color);
            color: var(--btn-text) !important;
            border: none;
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 15px;
            width: 100%;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 0 15px var(--glow);
            transition: 0.3s;
        }

        .btn-vpn {
            background: var(--dark-btn) !important;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .visitor-counter { margin-top: 20px; opacity: 0.4; font-size: 0.8rem; }

        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--main-color);
            z-index: 1000;
            color: var(--main-color);
            box-shadow: 0 0 10px var(--glow);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.9;
            filter: blur(1px);
            animation: move-up 1s ease-out forwards;
        }

        @keyframes move-up {
            0% { transform: translate(0, 0) scale(1); opacity: 0.9; }
            100% { transform: translate(0, -60px) scale(0); opacity: 0; }
        }

        @media (max-width: 768px) { #custom-cursor { display: none; } body { cursor: auto; } }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div id="particle-container"></div>

<div class="theme-switch" id="theme-btn">
    <i class="fas fa-bolt"></i>
</div>

<div class="container">
    <h1>AR1XY info</h1>
    <div class="status-online"><div class="dot"></div> Online</div>
    
    <a href="https://t.me/odwob" class="btn-custom">
        <i class="fab fa-telegram"></i> Мой Telegram
    </a>
    <a href="https://t.me/Lqphu" class="btn-custom">
        <i class="fas fa-users"></i> Мой ТГК
    </a>
    <a href="https://www.tiktok.com/@ar1xy.ru?_r=1&_t=ZS-960PFfGz9JU" class="btn-custom">
        <i class="fab fa-tiktok"></i> Мой Тик Ток
    </a>
    <a href="https://link.brawlstars.com/invite/friend/en/?tag=82Y08V20Q" class="btn-custom">
        <i class="fas fa-gamepad"></i> Друзья в БС
    </a>
    <a href="http://t.me/voprosy?start=mdhq02f" class="btn-custom">
        <i class="fas fa-comment-dots"></i> Анонимные вопросы
    </a>

    <a href="https://t.me/bypassrtp" class="btn-custom btn-vpn">
        <i class="fas fa-shield-alt"></i> лучший впн
    </a>

    <div class="visitor-counter">
        <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Far1xy.github.io%2FInfo%2F&count_bg=%2379C83D&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=views&edge_flat=false" alt="Views"/>
    </div>
</div>

<script>
    const cursor = document.getElementById('custom-cursor');
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    const pContainer = document.getElementById('particle-container');

    function spawnParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 12 + 6 + 'px'; 
        p.style.width = size; p.style.height = size;
        const color = getComputedStyle(body).getPropertyValue('--main-color');
        p.style.background = color;
        p.style.boxShadow = `0 0 15px ${color}, 0 0 30px ${color}`;
        p.style.left = (x - parseFloat(size)/2) + 'px'; 
        p.style.top = (y - parseFloat(size)/2) + 'px';
        pContainer.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        spawnParticle(e.clientX, e.clientY);
    });

    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        spawnParticle(touch.clientX, touch.clientY);
    }, {passive: true});

    if (localStorage.getItem('theme') === 'red') { body.setAttribute('data-theme', 'red'); }

    btn.addEventListener('click', () => {
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'blue');
        } else {
            body.setAttribute('data-theme', 'red');
            localStorage.setItem('theme', 'red');
        }
    });
</script>

</body>
</html>
