<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR1XY info</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Сияющий заголовок */
        h1 {
            font-size: 28px;
            text-align: center;
            color: #3b82f6; 
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.5);
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* Рамка вокруг кнопок */
        .button-frame {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
            text-align: center;
            color: #ffffff;
        }

        /* СИНИЕ СВЕТЯЩИЕСЯ КНОПКИ */
        .btn-blue {
            background-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); /* Синее свечение */
        }

        /* КНОПКА BRAWL STARS (усиленное свечение) */
        .btn-bs {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #2563eb 100%);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5); /* Фиолетовое свечение */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Эффект при нажатии */
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.8);
        }

        footer {
            margin-top: auto;
            padding-bottom: 20px;
            font-size: 12px;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>AR1XY info 💙</h1>

    <div class="button-frame">
        <a href="https://t.me/odwob" class="btn btn-blue">
            актуальный аккаунт
        </a>

        <a href="https://t.me/Lqphu" class="btn btn-blue">
            мой канал
        </a>

        <a href="https://link.brawlstars.com/invite/friend/en/?tag=82Y08V20Q" class="btn btn-bs">
            друзья в бс 💀
        </a>

        <a href="https://www.tiktok.com/@ar1xy.ru?_r=1&_t=ZS-960MiEgB8QW" class="btn btn-blue">
            мой тт
        </a>
    </div>

    <footer>
        © 2026 AR1XY Project
    </footer>

</body>
</html>
