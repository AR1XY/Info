<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #007bff;
            --btn-text: #ffffff;
            --glow: rgba(0, 123, 255, 0.6);
        }

        [data-theme="red"] {
            --main-color: #ff0000;
            --btn-text: #000000;
            --glow: rgba(255, 0, 0, 0.8);
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Важно для частиц */
            transition: 0.4s;
            cursor: none;
            touch-action: none; /* Предотвращает стандартные жесты браузера для работы искр */
        }

        /* Тот самый закругленный курсор */
        #custom-cursor {
            width: 20px;
            height: 20px;
            background-color: var(--main-color);
            border-radius: 6px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--main-color);
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }

        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 30px;
            z-index: 1;
            position: relative;
        }

        h1 {
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: var(--main-color);
            text-shadow: 0 0 20px var(--glow);
            letter-spacing: 3px;
        }

        .btn-custom {
            background: var(--main-color);
            color: var(--btn-text) !important;
            border: none;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 20px;
            width: 100%;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 0 15px var(--glow);
            transition: 0.3s;
        }

        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--main-color);
            z-index: 1000;
            color: var(--main-color);
            box-shadow: 0 0 10px var(--glow);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            animation: move-up 0.8s linear forwards;
        }

        @keyframes move-up {
            to { transform: translateY(-40px) scale(0); opacity: 0; }
        }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div id="particle-container"></div>

<div class="theme-switch" id="theme-btn">
    <i class="fas fa-bolt"></i>
</div>

<div class="container">
    <h1>AR1XY info</h1>
    
    <a href="https://t.me/odwob" class="btn-custom">
        <i class="fab fa-telegram"></i> Telegram
    </a>
    <a href="https://t.me/Lqphu" class="btn-custom">
        <i class="fas fa-users"></i> ТГК
    </a>
    <a href="https://www.tiktok.com/@ar1xy.ru?_r=1&_t=ZS-960PFfGz9JU" class="btn-custom">
        <i class="fab fa-tiktok"></i> TikTok
    </a>
    <a href="https://link.brawlstars.com/invite/friend/en/?tag=82Y08V20Q" class="btn-custom">
        <i class="fas fa-gamepad"></i> Brawl Stars
    </a>
    <a href="http://t.me/voprosy?start=mdhq02f" class="btn-custom">
        <i class="fas fa-comment-dots"></i> Вопросы
    </a>
</div>

<script>
    const cursor = document.getElementById('custom-cursor');
    const body = document.body;
    const btn = document.getElementById('theme-btn');
    const pContainer = document.getElementById('particle-container');

    // Функция создания искр
    function spawnParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 2 + 'px';
        p.style.width = size; p.style.height = size;
        const color = getComputedStyle(body).getPropertyValue('--main-color');
        p.style.background = color;
        p.style.boxShadow = `0 0 8px ${color}`;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        pContainer.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    // Движение мышки
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        spawnParticle(e.clientX, e.clientY);
    });

    // Движение пальца (Touch)
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        spawnParticle(touch.clientX, touch.clientY);
    }, {passive: true});

    // Смена темы
    if (localStorage.getItem('theme') === 'red') {
        body.setAttribute('data-theme', 'red');
    }

    btn.addEventListener('click', () => {
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'blue');
        } else {
            body.setAttribute('data-theme', 'red');
            localStorage.setItem('theme', 'red');
        }
    });
</script>

</body>
</html>
