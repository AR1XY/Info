<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR1XY CASINO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #007bff; --glow: rgba(0, 123, 255, 0.4); }
        [data-theme="red"] { --main-color: #ff0000; --glow: rgba(255, 0, 0, 0.5); }

        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .container { max-width: 420px; width: 95%; text-align: center; z-index: 5; }
        
        /* СЕТКА ИГР */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-game { 
            background: #111; border: 1px solid var(--main-color); color: var(--main-color); 
            padding: 15px; border-radius: 15px; font-weight: 800; font-size: 0.8rem;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-game:hover { background: var(--main-color); color: #fff; box-shadow: 0 0 15px var(--glow); }

        .game-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }

        /* DOUBLE (РУЛЕТКА) */
        .roulette-container { width: 100%; overflow: hidden; position: relative; height: 60px; border: 2px solid var(--main-color); margin: 20px 0; background: #111; }
        .roulette-tape { display: flex; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); position: absolute; left: 0; }
        .r-box { min-width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-right: 1px solid #000; }
        .r-red { background: #ff4d4d; } .r-black { background: #222; } .r-green { background: #28a745; }
        .pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: #fff; z-index: 10; box-shadow: 0 0 10px #fff; }

        /* TOWER */
        .tower-grid { display: grid; grid-template-rows: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
        .tower-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; opacity: 0.4; pointer-events: none; }
        .tower-row.active { opacity: 1; pointer-events: all; }
        .t-cell { width: 60px; height: 40px; background: #222; border: 1px solid #444; border-radius: 5px; display: flex; align-items: center; justify-content: center; }

        .btn-custom { background: var(--main-color); color: #fff; border: none; border-radius: 12px; padding: 12px; width: 100%; font-weight: bold; margin-top: 10px; }
        #global-bal { font-size: 1.2rem; font-weight: 900; color: #ffca28; text-shadow: 0 0 10px rgba(255,202,40,0.4); }
    </style>
</head>
<body>

<div id="double-modal" class="game-modal">
    <h3>DOUBLE</h3>
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="tape" class="roulette-tape"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button onclick="playDouble('red')" style="background:#ff4d4d; border:none; color:white; padding:10px; border-radius:5px;">x2 RED</button>
        <button onclick="playDouble('green')" style="background:#28a745; border:none; color:white; padding:10px; border-radius:5px;">x14 GREEN</button>
        <button onclick="playDouble('black')" style="background:#222; border:1px solid #555; color:white; padding:10px; border-radius:5px;">x2 BLACK</button>
    </div>
    <button onclick="closeModals()" style="color:#555; background:none; border:none;">ЗАКРЫТЬ</button>
</div>

<div id="tower-modal" class="game-modal">
    <h3>TOWER (Этаж: <span id="t-lvl">0</span>)</h3>
    <div id="tower-box" class="tower-grid"></div>
    <button id="t-cash" onclick="towerCashout()" class="btn-custom" style="display:none; background:#28a745;">ЗАБРАТЬ</button>
    <button id="t-start" onclick="startTower()" class="btn-custom">ИГРАТЬ (100)</button>
    <button onclick="closeModals()" style="color:#555; background:none; border:none; margin-top:10px;">ВЫЙТИ</button>
</div>

<div class="container">
    <h1 id="adm">AR1XY INFO</h1>
    <p>БАЛАНС: <span id="global-bal">1000</span> 💸</p>

    <div class="game-grid">
        <button onclick="openDouble()" class="btn-game">🎰 РУЛЕТКА</button>
        <button onclick="openTower()" class="btn-game">🏰 БАШНЯ</button>
        <button onclick="alert('Верни код из прошлого сообщения для КРАША')" class="btn-game">📈 КРАШ</button>
        <button onclick="alert('Верни код из прошлого сообщения для МИН')" class="btn-game">💣 МИНЫ</button>
    </div>

    <a href="https://t.me/odwob" class="btn-custom" style="display:block; text-decoration:none;">TELEGRAM</a>
    <a href="https://t.me/Lqphu" class="btn-custom" style="display:block; text-decoration:none; margin-top:10px; background:#333;">CHANNEL</a>
</div>

<script>
    let bal = parseInt(localStorage.getItem('b')) || 1000;
    function save() { localStorage.setItem('b', bal); document.getElementById('global-bal').innerText = bal; }

    // DOUBLE LOGIC
    function openDouble() { 
        document.getElementById('double-modal').style.display='flex';
        const tape = document.getElementById('tape');
        tape.innerHTML = '';
        for(let i=0; i<80; i++) {
            let color = i % 2 === 0 ? 'red' : 'black';
            if(i % 7 === 0) color = 'green';
            tape.innerHTML += `<div class="r-box r-${color}">${i%15}</div>`;
        }
    }

    function playDouble(betColor) {
        if(bal < 100) return alert("Мало монет!");
        bal -= 100; save();
        const tape = document.getElementById('tape');
        const spinWidth = 60 * 60; // 60 боксов
        const randomShift = Math.floor(Math.random() * 60);
        tape.style.transform = `translateX(-${spinWidth + randomShift}px)`;
        
        setTimeout(() => {
            let winColor = (Math.random() > 0.1) ? (Math.random() > 0.5 ? 'red' : 'black') : 'green';
            if(betColor === winColor) {
                let mult = winColor === 'green' ? 14 : 2;
                bal += 100 * mult; alert("ПОБЕДА! Цвет: " + winColor);
            } else { alert("ПРОИГРЫШ. Цвет: " + winColor); }
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            setTimeout(() => tape.style.transition = '4s cubic-bezier(0.1, 0, 0.1, 1)', 50);
            save();
        }, 4500);
    }

    // TOWER LOGIC
    let currentLvl = 0;
    let towerActive = false;
    function openTower() { document.getElementById('tower-modal').style.display='flex'; buildTower(); }
    function buildTower() {
        const box = document.getElementById('tower-box');
        box.innerHTML = '';
        for(let i=4; i>=0; i--) {
            let row = document.createElement('div');
            row.className = 'tower-row'; row.id = 'row-'+i;
            for(let j=0; j<3; j++) {
                let cell = document.createElement('div');
                cell.className = 't-cell';
                cell.onclick = () => stepTower(i, j);
                row.appendChild(cell);
            }
            box.appendChild(row);
        }
    }
    function startTower() {
        if(bal < 100) return;
        bal -= 100; currentLvl = 0; towerActive = true; save();
        buildTower();
        document.getElementById('row-0').classList.add('active');
        document.getElementById('t-start').style.display = 'none';
        document.getElementById('t-cash').style.display = 'block';
    }
    function stepTower(lvl, cellIdx) {
        if(!towerActive || lvl !== currentLvl) return;
        let winIdx = Math.floor(Math.random() * 3);
        if(cellIdx === winIdx) {
            document.querySelectorAll('#row-'+lvl+' .t-cell')[cellIdx].style.background = '#28a745';
            currentLvl++;
            if(currentLvl > 4) { towerCashout(); }
            else {
                document.getElementById('row-'+(lvl-1)).classList.remove('active'); // Ошибка в логике индекса, поправим:
                document.querySelectorAll('.tower-row').forEach(r => r.classList.remove('active'));
                document.getElementById('row-'+currentLvl).classList.add('active');
            }
            document.getElementById('t-lvl').innerText = currentLvl;
        } else {
            alert("LOSE!"); towerActive = false; openTower();
            document.getElementById('t-start').style.display = 'block';
            document.getElementById('t-cash').style.display = 'none';
        }
    }
    function towerCashout() {
        let win = Math.floor(100 * (1 + currentLvl * 0.8));
        bal += win; save(); alert("WIN: " + win);
        towerActive = false; openTower();
        document.getElementById('t-start').style.display = 'block';
        document.getElementById('t-cash').style.display = 'none';
    }

    function closeModals() { document.querySelectorAll('.game-modal').forEach(m=>m.style.display='none'); }
    
    // ADMIN (1234)
    let taps = 0;
    document.getElementById('adm').onclick = () => { if(taps++ > 5) { if(prompt("PASS")==="1234") { bal += 100000; save(); } taps=0; } };

    save();
</script>
</body>
</html>
